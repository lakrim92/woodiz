<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Commande confirmée – PANUOZZO</title>
  <link rel="stylesheet" href="css/style.css?v=18" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; padding: 24px; background: var(--cream); }
    .merci-box { background: var(--white); border-radius: 16px; padding: 48px 40px; max-width: 480px; box-shadow: var(--shadow); }
    .merci-icon { font-size: 4rem; margin-bottom: 16px; }
    .merci-box h1 { font-family: var(--font-head); font-size: 2rem; color: var(--green); margin-bottom: 12px; }
    .merci-box p { color: var(--gray); margin-bottom: 8px; }
    .merci-box .btn-primary { margin-top: 24px; display: inline-block; }
    .btn-receipt { display: inline-block; margin-top: 12px; padding: 11px 22px; background: #f5f5f0; color: var(--green); border: 2px solid var(--green); border-radius: 8px; font-size: .9rem; font-weight: 600; text-decoration: none; }
    .btn-receipt:hover { background: var(--green); color: #fff; }
  </style>
</head>
<body>
  <div class="merci-box">
    <div class="merci-icon">🍕</div>
    <h1>Commande confirmée !</h1>
    <p>Merci pour ta commande. Tu recevras un email de confirmation.</p>
    <p>Temps de préparation estimé : <strong>30 minutes</strong></p>
    <a href="/" class="btn-primary">← Retour à l'accueil</a>
    <br>
    <a id="btn-receipt" href="#" class="btn-receipt" style="display:none">📄 Télécharger mon reçu</a>
  </div>
  <script>
    // Confirme la commande côté serveur dès l'arrivée sur cette page
    const sessionId = new URLSearchParams(location.search).get('session_id');
    if (sessionId) {
      fetch(`/api/confirm?session_id=${encodeURIComponent(sessionId)}`).catch(() => {});
      const btn = document.getElementById('btn-receipt');
      btn.href = `/api/receipt/${encodeURIComponent(sessionId)}`;
      btn.style.display = 'inline-block';
    }
  </script>
</body>
</html>
