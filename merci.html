<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Commande confirmée – PANUOZZO</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; padding: 24px; background: var(--cream); }
    .merci-box { background: var(--white); border-radius: 16px; padding: 48px 40px; max-width: 480px; box-shadow: var(--shadow); }
    .merci-icon { font-size: 4rem; margin-bottom: 16px; }
    .merci-box h1 { font-family: var(--font-head); font-size: 2rem; color: var(--green); margin-bottom: 12px; }
    .merci-box p { color: var(--gray); margin-bottom: 8px; }
    .merci-box .btn-primary { margin-top: 24px; display: inline-block; }
  </style>
</head>
<body>
  <div class="merci-box">
    <div class="merci-icon">🍕</div>
    <h1>Commande confirmée !</h1>
    <p>Merci pour ta commande. Tu recevras un email de confirmation.</p>
    <p>Temps de préparation estimé : <strong>30 minutes</strong></p>
    <a href="/" class="btn-primary">← Retour à l'accueil</a>
  </div>
</body>
</html>
