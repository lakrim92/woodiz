<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PANUOZZO" />
  <meta name="theme-color" content="#1a6b4e" />
  <link rel="manifest" href="/tablette-manifest.json" />
  <title>Tablette — PANUOZZO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1a6b4e;
      --red:    #dc2626;
      --yellow: #f59e0b;
      --blue:   #2563eb;
      --gray:   #6b7280;
      --bg:     #0f1117;
      --card:   #1a1d27;
      --border: rgba(255,255,255,.08);
      --white:  #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    .header-logo span { color: var(--yellow); }
    .header-status { display: flex; align-items: center; gap: 8px; font-size: .82rem; color: rgba(255,255,255,.5); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    /* ── Filtres ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: rgba(255,255,255,.6);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(255,255,255,.1);
      color: var(--white);
      border-color: rgba(255,255,255,.25);
    }
    .filter-btn.active { border-color: var(--yellow); color: var(--yellow); }
    .badge-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: .68rem;
      font-weight: 800;
      margin-left: 5px;
      vertical-align: middle;
    }
    .badge-count:empty { display: none; }

    /* ── Grille commandes ── */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0 24px 32px;
    }

    /* ── Carte commande ── */
    .order-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }
    .order-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }

    .order-card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .order-number { font-size: .72rem; color: rgba(255,255,255,.4); }
    .order-time   { font-size: .82rem; font-weight: 700; }

    .status-pill {
      padding: 4px 11px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .status-nouveau       { background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
    .status-en_preparation { background: rgba(37,99,235,.15);  color: #60a5fa;      border: 1px solid rgba(37,99,235,.3); }
    .status-pret          { background: rgba(26,107,78,.2);   color: #4ade80;      border: 1px solid rgba(26,107,78,.4); }
    .status-livre         { background: rgba(255,255,255,.05); color: rgba(255,255,255,.35); border: 1px solid rgba(255,255,255,.1); }

    .order-card-body { padding: 14px 16px; }

    .order-client { margin-bottom: 10px; }
    .order-client-name { font-weight: 700; font-size: .95rem; }
    .order-client-phone { color: rgba(255,255,255,.5); font-size: .8rem; margin-top: 2px; }

    .order-mode {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .mode-livraison { background: rgba(37,99,235,.12); color: #60a5fa; }
    .mode-emporter  { background: rgba(26,107,78,.12); color: #4ade80; }

    .order-address {
      font-size: .78rem;
      color: rgba(255,255,255,.55);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .order-items { margin-bottom: 12px; }
    .order-item {
      display: flex;
      justify-content: space-between;
      font-size: .84rem;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .order-item:last-child { border-bottom: none; }
    .order-item-qty { color: rgba(255,255,255,.45); margin-right: 6px; }

    .order-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: .9rem;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.08);
      margin-top: 4px;
    }

    .order-instructions {
      margin-top: 10px;
      padding: 8px 10px;
      background: rgba(245,158,11,.07);
      border-left: 3px solid var(--yellow);
      border-radius: 0 6px 6px 0;
      font-size: .78rem;
      color: rgba(255,255,255,.7);
      line-height: 1.4;
    }

    /* ── Actions statut ── */
    .order-card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .btn-status {
      flex: 1;
      padding: 9px 8px;
      border-radius: 8px;
      border: none;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-status:hover   { opacity: .85; }
    .btn-status:active  { transform: scale(.97); }
    .btn-status:disabled { opacity: .25; cursor: default; }

    .btn-preparation { background: rgba(37,99,235,.2);  color: #60a5fa; }
    .btn-pret        { background: rgba(26,107,78,.2);  color: #4ade80; }
    .btn-livre       { background: rgba(255,255,255,.07); color: rgba(255,255,255,.5); }

    /* ── Vide ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: rgba(255,255,255,.3);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── Notif toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-box h2 { font-size: 1.3rem; margin-bottom: 6px; }
    .login-box p  { color: rgba(255,255,255,.4); font-size: .84rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,.05);
      color: #fff;
      font-size: .95rem;
      margin-bottom: 12px;
      outline: none;
    }
    .login-box input:focus { border-color: var(--green); }
    .login-box button {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .login-error { color: var(--red); font-size: .8rem; margin-top: 8px; min-height: 18px; }

    @media (max-width: 600px) {
      .orders-grid { padding: 0 12px 24px; }
      .filters { padding: 12px; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-overlay">
  <div class="login-box">
    <div style="font-size:2.2rem;margin-bottom:12px">🍕</div>
    <h2>PANUOZZO</h2>
    <p>Accès réservé au personnel</p>
    <input type="password" id="login-input" placeholder="Mot de passe" autocomplete="current-password" />
    <button onclick="checkLogin()">Entrer</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <header class="header">
    <div class="header-logo">🍕 <span>PANUOZZO</span> — Tableau des commandes</div>
    <div class="header-status">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">Connexion…</span>
    </div>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Toutes <span class="badge-count" id="badge-all"></span></button>
    <button class="filter-btn" data-filter="nouveau" onclick="setFilter('nouveau', this)">Nouvelles <span class="badge-count" id="badge-nouveau"></span></button>
    <button class="filter-btn" data-filter="en_preparation" onclick="setFilter('en_preparation', this)">En préparation <span class="badge-count" id="badge-en_preparation"></span></button>
    <button class="filter-btn" data-filter="pret" onclick="setFilter('pret', this)">Prêtes <span class="badge-count" id="badge-pret"></span></button>
    <button class="filter-btn" data-filter="livre" onclick="setFilter('livre', this)">Livrées</button>
  </div>

  <div class="orders-grid" id="orders-grid"></div>
</div>

<div id="toast"></div>

<!-- Son notification -->
<audio id="notif-sound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." preload="auto"></audio>

<script>
  // ── Service Worker (PWA) ─────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/tablette-sw.js').catch(() => {});
  }

  // ── Audio Context (débloqué après geste utilisateur) ─────
  let audioCtx = null;
  function unlockAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch {}
  }
  document.addEventListener('click', unlockAudio, { once: true });

  // ── Auth ─────────────────────────────────────────────────
  const SESSION_KEY = 'panuozzo_tablette_auth';

  function checkLogin() {
    unlockAudio(); // débloquer l'audio dès le premier clic
    const pwd = document.getElementById('login-input').value;
    const err = document.getElementById('login-error');
    if (!pwd) { err.textContent = 'Entrez le mot de passe'; return; }
    // Vérifie via l'API (le serveur compare avec TABLETTE_PASSWORD)
    fetch('/api/auth/tablette', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        sessionStorage.setItem(SESSION_KEY, pwd);
        showApp();
      } else {
        err.textContent = 'Mot de passe incorrect';
        document.getElementById('login-input').value = '';
      }
    })
    .catch(() => { err.textContent = 'Erreur réseau'; });
  }

  document.getElementById('login-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkLogin();
  });

  function showApp() {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initSSE();
  }

  // Auto-login si session active
  const savedPwd = sessionStorage.getItem(SESSION_KEY);
  if (savedPwd) {
    fetch('/api/auth/tablette', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: savedPwd }),
    }).then(r => r.json()).then(data => { if (data.ok) showApp(); });
  }

  // ── State ─────────────────────────────────────────────────
  let orders = [];
  let currentFilter = 'all';

  const STATUS_LABELS = {
    nouveau:        '🟡 Nouvelle',
    en_preparation: '🔵 En préparation',
    pret:           '🟢 Prête',
    livre:          '⚫ Livrée',
  };

  // ── SSE ───────────────────────────────────────────────────
  function initSSE() {
    const es = new EventSource('/api/orders/stream');

    es.addEventListener('init', e => {
      orders = JSON.parse(e.data);
      render();
      setConn(true);
    });

    es.addEventListener('new-order', e => {
      const order = JSON.parse(e.data);
      orders.unshift(order);
      render();
      playNotif();
      showToast(`🔔 Nouvelle commande — ${order.delivery?.prenom || ''} ${order.delivery?.nom || ''} — ${order.total?.toFixed(2)}€`);
    });

    es.addEventListener('status-update', e => {
      const { id, status } = JSON.parse(e.data);
      const o = orders.find(o => o.id === id);
      if (o) { o.status = status; render(); }
    });

    es.onerror = () => setConn(false);
    es.onopen  = () => setConn(true);
  }

  function setConn(ok) {
    document.getElementById('conn-dot').style.background = ok ? '#4ade80' : '#dc2626';
    document.getElementById('conn-label').textContent = ok ? 'En direct' : 'Reconnexion…';
  }

  // ── Filtres ───────────────────────────────────────────────
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Rendu ─────────────────────────────────────────────────
  function render() {
    const grid = document.getElementById('orders-grid');

    // Badges
    ['nouveau','en_preparation','pret'].forEach(s => {
      const el = document.getElementById(`badge-${s}`);
      const n = orders.filter(o => o.status === s).length;
      if (el) el.textContent = n || '';
    });
    const allActive = orders.filter(o => o.status !== 'livre').length;
    const badgeAll = document.getElementById('badge-all');
    if (badgeAll) badgeAll.textContent = allActive || '';

    const filtered = currentFilter === 'all'
      ? orders.filter(o => o.status !== 'livre')
      : orders.filter(o => o.status === currentFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🍕</div>
          <p>Aucune commande ${currentFilter === 'all' ? 'active' : STATUS_LABELS[currentFilter]?.toLowerCase() || ''}</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(order => orderCard(order)).join('');
  }

  function orderCard(order) {
    const d = order.delivery || {};
    const time = new Date(order.createdAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const isLivraison = d.mode === 'livraison';

    const addrParts = [d.adresse, d.etage && `Ét. ${d.etage}`, d.appt && `Apt ${d.appt}`, d.batiment && `Bât. ${d.batiment}`, d.codeAcces && `Code : ${d.codeAcces}`].filter(Boolean);

    const itemsHtml = (order.items || []).map(i =>
      `<div class="order-item"><span><span class="order-item-qty">${i.qty}×</span>${i.name}</span><span>${i.price?.toFixed(2)}€</span></div>`
    ).join('');

    const btnPrep = `<button class="btn-status btn-preparation" onclick="updateStatus('${order.id}','en_preparation')" ${order.status !== 'nouveau' ? 'disabled' : ''}>👨‍🍳 En prépa</button>`;
    const btnPret = `<button class="btn-status btn-pret" onclick="updateStatus('${order.id}','pret')" ${order.status !== 'en_preparation' ? 'disabled' : ''}>✅ Prête</button>`;
    const btnLivre = `<button class="btn-status btn-livre" onclick="updateStatus('${order.id}','livre')" ${order.status !== 'pret' ? 'disabled' : ''}>${isLivraison ? '🛵 Livrée' : '🏠 Récupérée'}</button>`;

    return `
      <div class="order-card" id="card-${order.id}">
        <div class="order-card-header">
          <div>
            <div class="order-number">#${String(order.orderNumber).slice(-6)}</div>
            <div class="order-time">${time}</div>
          </div>
          <span class="status-pill status-${order.status}">${STATUS_LABELS[order.status] || order.status}</span>
        </div>
        <div class="order-card-body">
          <div class="order-client">
            <div class="order-client-name">${d.prenom || ''} ${d.nom || ''}</div>
            ${d.telephone ? `<div class="order-client-phone">📞 ${d.telephone}</div>` : ''}
          </div>
          <div class="order-mode ${isLivraison ? 'mode-livraison' : 'mode-emporter'}">
            ${isLivraison ? '🛵 Livraison' : '🏠 Retrait sur place'}
          </div>
          ${isLivraison && addrParts.length ? `<div class="order-address">${addrParts.join(' · ')}</div>` : ''}
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total"><span>Total</span><span>${order.total?.toFixed(2)}€</span></div>
          ${d.instructions ? `<div class="order-instructions">💬 ${d.instructions}</div>` : ''}
        </div>
        <div class="order-card-footer">
          ${btnPrep}${btnPret}${btnLivre}
        </div>
      </div>`;
  }

  // ── Mise à jour statut ────────────────────────────────────
  async function updateStatus(id, status) {
    try {
      await fetch(`/api/orders/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      const o = orders.find(o => o.id === id);
      if (o) { o.status = status; render(); }
    } catch (err) {
      showToast('❌ Erreur de mise à jour', true);
    }
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#dc2626' : '#1a6b4e';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
  }

  // ── Son notification ──────────────────────────────────────
  function playNotif() {
    if (!audioCtx) {
      // Dernier recours : tenter de créer le contexte
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch { return; }
    }
    try {
      // Reprendre si suspendu (politique autoplay navigateur)
      if (audioCtx.state === 'suspended') audioCtx.resume();
      // 3 bips ascendants façon Uber Eats
      [880, 1100, 1320].forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = 'triangle';
        const t = audioCtx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.4, t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        osc.start(t);
        osc.stop(t + 0.3);
      });
    } catch {}
  }
</script>
</body>
</html>
