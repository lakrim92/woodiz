<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PANUOZZO" />
  <meta name="theme-color" content="#1a6b4e" />
  <link rel="manifest" href="/tablette-manifest.json" />
  <title>Tablette — PANUOZZO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1a6b4e;
      --red:    #dc2626;
      --yellow: #f59e0b;
      --blue:   #2563eb;
      --gray:   #6b7280;
      --bg:     #0f1117;
      --card:   #1a1d27;
      --border: rgba(255,255,255,.08);
      --white:  #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    .header-logo span { color: var(--yellow); }
    .header-status { display: flex; align-items: center; gap: 8px; font-size: .82rem; color: rgba(255,255,255,.5); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    /* ── Filtres ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: rgba(255,255,255,.6);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(255,255,255,.1);
      color: var(--white);
      border-color: rgba(255,255,255,.25);
    }
    .filter-btn.active { border-color: var(--yellow); color: var(--yellow); }
    .badge-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: .68rem;
      font-weight: 800;
      margin-left: 5px;
      vertical-align: middle;
    }
    .badge-count:empty { display: none; }

    /* ── Grille commandes ── */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0 24px 32px;
    }

    /* ── Carte commande ── */
    .order-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }
    .order-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }

    .order-card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .order-number { font-size: .72rem; color: rgba(255,255,255,.4); }
    .order-time   { font-size: .82rem; font-weight: 700; }

    .status-pill {
      padding: 4px 11px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .status-nouveau       { background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
    .status-en_preparation { background: rgba(37,99,235,.15);  color: #60a5fa;      border: 1px solid rgba(37,99,235,.3); }
    .status-pret          { background: rgba(26,107,78,.2);   color: #4ade80;      border: 1px solid rgba(26,107,78,.4); }
    .status-livre         { background: rgba(255,255,255,.05); color: rgba(255,255,255,.35); border: 1px solid rgba(255,255,255,.1); }

    .order-card-body { padding: 14px 16px; }

    .order-client { margin-bottom: 10px; }
    .order-client-name { font-weight: 700; font-size: .95rem; }
    .order-client-phone { color: rgba(255,255,255,.5); font-size: .8rem; margin-top: 2px; }

    .order-mode {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .mode-livraison { background: rgba(37,99,235,.12); color: #60a5fa; }
    .mode-emporter  { background: rgba(26,107,78,.12); color: #4ade80; }

    .order-address {
      font-size: .78rem;
      color: rgba(255,255,255,.55);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .order-items { margin-bottom: 12px; }
    .order-item {
      font-size: .84rem;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .order-item:last-child { border-bottom: none; }
    .order-item-main { display: flex; align-items: baseline; gap: 4px; font-weight: 600; }
    .order-item-qty { color: rgba(255,255,255,.45); margin-right: 4px; }
    .order-item-price { margin-left: auto; color: rgba(255,255,255,.55); font-weight: 400; }
    .item-detail { font-size: .76rem; padding-left: 18px; margin-top: 2px; line-height: 1.4; }
    .item-removed { color: #f87171; }
    .item-added   { color: #4ade80; }
    .item-meat    { color: #fbbf24; }
    .item-desc    { color: rgba(255,255,255,.5); }

    .order-promo {
      background: rgba(22, 163, 74, .12);
      border: 1px solid rgba(22, 163, 74, .3);
      border-radius: 6px;
      color: #4ade80;
      font-size: .78rem;
      font-weight: 600;
      padding: 4px 8px;
      margin-bottom: 6px;
    }

    .order-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: .9rem;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.08);
      margin-top: 4px;
    }

    .order-instructions {
      margin-top: 10px;
      padding: 8px 10px;
      background: rgba(245,158,11,.07);
      border-left: 3px solid var(--yellow);
      border-radius: 0 6px 6px 0;
      font-size: .78rem;
      color: rgba(255,255,255,.7);
      line-height: 1.4;
    }

    /* ── Actions statut ── */
    .order-card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .btn-status {
      flex: 1;
      padding: 9px 8px;
      border-radius: 8px;
      border: none;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-status:hover   { opacity: .85; }
    .btn-status:active  { transform: scale(.97); }
    .btn-status:disabled { opacity: .25; cursor: default; }

    .btn-preparation { background: rgba(37,99,235,.2);  color: #60a5fa; }
    .btn-pret        { background: rgba(26,107,78,.2);  color: #4ade80; }
    .btn-livre       { background: rgba(255,255,255,.07); color: rgba(255,255,255,.5); }

    .btn-print {
      flex: 0 0 auto;
      width: 38px;
      padding: 9px 0;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.55);
      font-size: .88rem;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-print:hover { background: rgba(255,255,255,.12); color: var(--white); }

    /* ── Vide ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: rgba(255,255,255,.3);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── Notif toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-box h2 { font-size: 1.3rem; margin-bottom: 6px; }
    .login-box p  { color: rgba(255,255,255,.4); font-size: .84rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,.05);
      color: #fff;
      font-size: .95rem;
      margin-bottom: 12px;
      outline: none;
    }
    .login-box input:focus { border-color: var(--green); }
    .login-box button {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .login-error { color: var(--red); font-size: .8rem; margin-top: 8px; min-height: 18px; }

    /* ── Modale livraison ── */
    #delivery-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    #delivery-modal.open {
      opacity: 1;
      pointer-events: all;
    }
    .delivery-modal-box {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      transform: translateY(16px);
      transition: transform .2s;
    }
    #delivery-modal.open .delivery-modal-box { transform: translateY(0); }
    .delivery-modal-header {
      background: #1e3a5f;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .delivery-modal-header h3 { font-size: 1rem; color: #60a5fa; margin: 0; }
    .delivery-modal-close {
      background: rgba(255,255,255,.1);
      border: none;
      color: #fff;
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .delivery-modal-body { padding: 20px; }
    .delivery-row {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: .88rem;
      line-height: 1.4;
    }
    .delivery-row:last-child { border-bottom: none; }
    .delivery-row-label {
      color: rgba(255,255,255,.4);
      min-width: 100px;
      flex-shrink: 0;
      font-size: .8rem;
      padding-top: 1px;
    }
    .delivery-row-value { color: var(--white); font-weight: 500; }
    .delivery-row-value.address { color: #60a5fa; font-weight: 700; }

    .btn-delivery-info {
      background: rgba(37,99,235,.2);
      border: 1px solid rgba(37,99,235,.3);
      color: #60a5fa;
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 6px;
      vertical-align: middle;
    }
    .btn-delivery-info:hover { background: rgba(37,99,235,.35); }

    @media (max-width: 600px) {
      .orders-grid { padding: 0 12px 24px; }
      .filters { padding: 12px; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-overlay">
  <div class="login-box">
    <div style="font-size:2.2rem;margin-bottom:12px">🍕</div>
    <h2>PANUOZZO</h2>
    <p>Accès réservé au personnel</p>
    <input type="password" id="login-input" placeholder="Mot de passe" autocomplete="current-password" />
    <button id="login-btn">Entrer</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <header class="header">
    <div class="header-logo">🍕 <span>PANUOZZO</span> — Tableau des commandes</div>
    <div class="header-status">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">Connexion…</span>
    </div>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Toutes <span class="badge-count" id="badge-all"></span></button>
    <button class="filter-btn" data-filter="nouveau">Nouvelles <span class="badge-count" id="badge-nouveau"></span></button>
    <button class="filter-btn" data-filter="en_preparation">En préparation <span class="badge-count" id="badge-en_preparation"></span></button>
    <button class="filter-btn" data-filter="pret">Prêtes <span class="badge-count" id="badge-pret"></span></button>
    <button class="filter-btn" data-filter="livre">Livrées</button>
  </div>

  <div class="orders-grid" id="orders-grid"></div>
</div>

<!-- Modale infos livraison -->
<div id="delivery-modal">
  <div class="delivery-modal-box">
    <div class="delivery-modal-header">
      <h3>🛵 Infos de livraison</h3>
      <button class="delivery-modal-close" id="delivery-modal-close-btn">✕</button>
    </div>
    <div class="delivery-modal-body" id="delivery-modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<!-- Son notification -->
<audio id="notif-sound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." preload="auto"></audio>

<script src="/js/tablette.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/tablette-sw.js').catch(() => {});
  }
</script>
</body>
</html>
